name: Classroom Autograding

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Task A Tests (23)
        id: task_a
        continue-on-error: true
        run: |
          python -m unittest discover -s lab1_core/tests -p "test_task_a.py" -v

      - name: Run Task B Tests (24)
        id: task_b
        continue-on-error: true
        run: |
          python -m unittest discover -s lab1_core/tests -p "test_task_b.py" -v

      - name: Run Task C Tests (23)
        id: task_c
        continue-on-error: true
        run: |
          python -m unittest discover -s lab1_core/tests -p "test_task_c.py" -v

      - name: Run Bonus Tests (30, non-blocking)
        id: lab2_bonus
        continue-on-error: true
        run: |
          python -m unittest discover -s lab2_bonus/tests -p "test_bonus.py" -v

      - name: Autograding Summary
        if: always()
        run: |
          echo "Task A outcome: ${{ steps.task_a.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Task B outcome: ${{ steps.task_b.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Task C outcome: ${{ steps.task_c.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Bonus outcome:  ${{ steps.lab2_bonus.outcome }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Core Pass (A/B/C)
        if: always()
        run: |
          core_failed=0
          if [ "${{ steps.task_a.outcome }}" != "success" ]; then core_failed=1; fi
          if [ "${{ steps.task_b.outcome }}" != "success" ]; then core_failed=1; fi
          if [ "${{ steps.task_c.outcome }}" != "success" ]; then core_failed=1; fi
          if [ "$core_failed" -ne 0 ]; then
            echo "Core tasks not passed (A/B/C). See summary above." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
